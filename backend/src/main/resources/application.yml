server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: blade-monitor
  websocket:
    timeout: 600000

app:
  simulator:
    enabled: true
    target-pps: 150000
    rpm-ramp-mode: true
  udp:
    port: 9000
    buffer-size: 65536
    socket-receive-buffer: 104857600
    selector-timeout-ms: 10
  buffer:
    ring-buffer-size: 65536
  fft:
    window-size: 1024
    overlap: 0.5
    sample-rate: 10000
    low-cut-freq: 10.0
    high-cut-freq: 2000.0
  websocket:
    broadcast-interval-ms: 16
    max-clients: 32
  data:
    blade-count: 24
    max-rpm: 20000
  persistence:
    enabled: true
    batch-size: 1000
    max-queue-size: 100000
    flush-interval-ms: 500
    rpm-threshold: 1000
  fatigue:
    enabled: true
    damage-warning-threshold: 0.001
    damage-critical-threshold: 0.005
    max-amplitude-warning: 100.0
    max-amplitude-critical: 200.0
    fatigue-limit-strain: 500.0
    cycles-to-failure: 10000000.0
    sn-exponent: 5.0
    min-cycle-batch-size: 100
    warning-cooldown-ms: 5000

logging:
  level:
    com.aero.blademonitor: INFO
    org.springframework: WARN
